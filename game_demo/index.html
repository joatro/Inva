<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' blob:; worker-src 'self' blob:;">
    <title>Invader Space - Compose Multiplatform</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Evita que el navegador intente hacer scroll en toda la página */
        }
        #compose-target {
            width: 100%;
            height: 100%;
            touch-action: none; /* Vital para que el juego capture los toques sin errores */
            outline: none; /* Quita el borde de selección al tocar */
        }

        /* === ESTILOS PANTALLA DE CARGA === */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #003300;
            border-top: 4px solid #00FF41; /* Verde alien */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px #00FF41;
        }
        .loading-text {
            margin-top: 20px;
            color: #00FF41;
            font-family: monospace;
            font-size: 1.2em;
            text-shadow: 0 0 5px #00FF41;
            letter-spacing: 2px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #fullscreen-btn {
            position: absolute;
            bottom: 30px;
            padding: 10px 20px;
            background-color: transparent;
            color: #00FF41;
            border: 2px solid #00FF41;
            font-family: monospace;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            opacity: 0.8;
            text-shadow: 0 0 5px #00FF41;
        }
        #fullscreen-btn:hover {
            background-color: #00FF41;
            color: black;
            opacity: 1;
            box-shadow: 0 0 10px #00FF41;
            text-shadow: none;
        }
    </style>
    <script type="application/javascript" src="composeApp.js"></script>
</head>
<body>
    <!-- === PANTALLA DE CARGA === -->
    <div id="loading-overlay">
        <div class="loader-spinner"></div>
        <div class="loading-text">LOADING SYSTEM...</div>
        <button id="fullscreen-btn">PANTALLA COMPLETA</button>
    </div>

    <canvas id="compose-target"></canvas>

    <!-- === SCRIPT PARA OCULTAR CARGA === -->
    <script>
        // --- Lógica de Pantalla Completa ---
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        function toggleFullScreen() {
            const doc = window.document;
            const docEl = doc.documentElement;

            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (requestFullScreen) {
                    requestFullScreen.call(docEl);
                }
            } else {
                if (cancelFullScreen) {
                    cancelFullScreen.call(doc);
                }
            }
        }

        function updateFullscreenButtonText() {
            const doc = window.document;
            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                fullscreenBtn.textContent = 'PANTALLA COMPLETA';
            } else {
                fullscreenBtn.textContent = 'SALIR DE PANTALLA COMPLETA';
            }
        }

        if (fullscreenBtn) {
            fullscreenBtn.addEventListener('click', toggleFullScreen);
            document.addEventListener('fullscreenchange', updateFullscreenButtonText);
            document.addEventListener('webkitfullscreenchange', updateFullscreenButtonText);
            document.addEventListener('mozfullscreenchange', updateFullscreenButtonText);
            document.addEventListener('MSFullscreenChange', updateFullscreenButtonText);
        }

        // Función para desvanecer y eliminar el loader
        function hideLoader() {
            var overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(function() {
                    overlay.style.display = 'none';
                }, 500); // Espera a que termine la transición de opacidad
            }
        }

        window.addEventListener('load', function() {
            // composeApp es una variable global (Promesa) creada por el script del juego
            if (window.composeApp && typeof window.composeApp.then === 'function') {
                window.composeApp.then(function() {
                    // El juego ha cargado en memoria.
                    // Damos un pequeño margen (800ms) para que pinte el primer frame antes de quitar el loader.
                    setTimeout(hideLoader, 800);
                }).catch(function(e) {
                    console.error("Error iniciando el juego:", e);
                    // Opcional: Mostrar mensaje de error en el loader
                });
            } else {
                // Fallback: Si no detectamos la promesa, ocultamos por tiempo (por seguridad)
                setTimeout(hideLoader, 2000);
            }
        });
    </script>
</body>
</html>
